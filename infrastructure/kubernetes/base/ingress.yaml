apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-ingress
  namespace: ai-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.ai-platform.example.com
        - app.ai-platform.example.com
      secretName: ai-platform-tls
  rules:
    - host: app.ai-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    - host: api.ai-platform.example.com
      http:
        paths:
          - path: /api/v1/ingest
            pathType: Prefix
            backend:
              service:
                name: ingestion-service
                port:
                  number: 8001
          - path: /api/v1/validation
            pathType: Prefix
            backend:
              service:
                name: validation-service
                port:
                  number: 8002
          - path: /api/v1/transform
            pathType: Prefix
            backend:
              service:
                name: transformation-service
                port:
                  number: 8003
          - path: /api/v1/ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 8004
