version: '3.9'

services:
  # ─── Databases ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_platform
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: platform_pass
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d ai_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports: ["9200:9200"]
    volumes:
      - es_data:/usr/share/elasticsearch/data

  chromadb:
    image: chromadb/chroma:latest
    ports: ["8100:8000"]
    volumes:
      - chroma_data:/chroma/chroma

  # ─── Messaging ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zk_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports: ["5672:5672", "15672:15672"]
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ─── Python Services ────────────────────────────────────────────────────────
  ingestion-service:
    build:
      context: ./python-services/ingestion-service
      dockerfile: ../../infrastructure/docker/Dockerfile.python
    ports: ["8001:8001"]
    env_file: .env
    environment:
      PORT: 8001
    depends_on:
      postgres: { condition: service_healthy }
      mongodb:  { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./python-services/ingestion-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  validation-service:
    build:
      context: ./python-services/validation-service
      dockerfile: ../../infrastructure/docker/Dockerfile.python
    ports: ["8002:8002"]
    env_file: .env
    environment:
      PORT: 8002
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - ./python-services/validation-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  transformation-service:
    build:
      context: ./python-services/transformation-service
      dockerfile: ../../infrastructure/docker/Dockerfile.python
    ports: ["8003:8003"]
    env_file: .env
    environment:
      PORT: 8003
    volumes:
      - ./python-services/transformation-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload

  ai-service:
    build:
      context: ./python-services/ai-service
      dockerfile: ../../infrastructure/docker/Dockerfile.python
    ports: ["8004:8004"]
    env_file: .env
    environment:
      PORT: 8004
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - ./python-services/ai-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8004 --reload

  pdf-service:
    build:
      context: ./python-services/pdf-service
      dockerfile: ../../infrastructure/docker/Dockerfile.pdf
    ports: ["8005:8005"]
    env_file: .env
    environment:
      PORT: 8005
    volumes:
      - ./python-services/pdf-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8005 --reload

  scheduling-service:
    build:
      context: ./python-services/scheduling-service
      dockerfile: ../../infrastructure/docker/Dockerfile.python
    ports: ["8006:8006"]
    env_file: .env
    environment:
      PORT: 8006
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - ./python-services/scheduling-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8006 --reload

  celery-worker:
    build:
      context: ./python-services/scheduling-service
      dockerfile: ../../infrastructure/docker/Dockerfile.python
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - ./python-services/scheduling-service:/app
    command: celery -A app.core.celery_app worker --loglevel=info -Q pipelines

  celery-flower:
    build:
      context: ./python-services/scheduling-service
      dockerfile: ../../infrastructure/docker/Dockerfile.python
    ports: ["5555:5555"]
    env_file: .env
    depends_on: [celery-worker]
    volumes:
      - ./python-services/scheduling-service:/app
    command: celery -A app.core.celery_app flower --port=5555

  notification-service:
    build:
      context: ./python-services/notification-service
      dockerfile: ../../infrastructure/docker/Dockerfile.python
    ports: ["8007:8007"]
    env_file: .env
    environment:
      PORT: 8007
    volumes:
      - ./python-services/notification-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8007 --reload

  analytics-service:
    build:
      context: ./python-services/analytics-service
      dockerfile: ../../infrastructure/docker/Dockerfile.python
    ports: ["8008:8008"]
    env_file: .env
    environment:
      PORT: 8008
    depends_on:
      mongodb: { condition: service_healthy }
    volumes:
      - ./python-services/analytics-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8008 --reload

  # ─── .NET Services ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./dotnet-services/auth-service
      dockerfile: ../../infrastructure/docker/Dockerfile.dotnet
    ports: ["8010:8080"]
    env_file: .env
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=ai_platform;Username=platform_user;Password=platform_pass"
    depends_on:
      postgres: { condition: service_healthy }

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_INGESTION_URL: http://ingestion-service:8001
      NEXT_PUBLIC_VALIDATION_URL: http://validation-service:8002
      NEXT_PUBLIC_AI_SERVICE_URL: http://ai-service:8004
      NEXT_PUBLIC_ANALYTICS_URL: http://analytics-service:8008
    depends_on:
      - ingestion-service
      - validation-service

  # ─── Observability ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.retention.time=15d

  grafana:
    image: grafana/grafana:10.2.2
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on: [prometheus]

  jaeger:
    image: jaegertracing/all-in-one:1.52
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  kibana:
    image: kibana:8.11.1
    ports: ["5601:5601"]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on: [elasticsearch]

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  es_data:
  chroma_data:
  zk_data:
  kafka_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
