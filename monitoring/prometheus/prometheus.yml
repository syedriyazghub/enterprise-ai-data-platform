global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ingestion-service'
    static_configs:
      - targets: ['ingestion-service:8001']
    metrics_path: /metrics

  - job_name: 'validation-service'
    static_configs:
      - targets: ['validation-service:8002']
    metrics_path: /metrics

  - job_name: 'transformation-service'
    static_configs:
      - targets: ['transformation-service:8003']
    metrics_path: /metrics

  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:8004']
    metrics_path: /metrics

  - job_name: 'pdf-service'
    static_configs:
      - targets: ['pdf-service:8005']
    metrics_path: /metrics

  - job_name: 'scheduling-service'
    static_configs:
      - targets: ['scheduling-service:8006']
    metrics_path: /metrics

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8007']
    metrics_path: /metrics

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:8008']
    metrics_path: /metrics

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
