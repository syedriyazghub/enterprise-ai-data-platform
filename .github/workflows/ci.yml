name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  test-python:
    name: Test Python Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - ingestion-service
          - validation-service
          - transformation-service
          - ai-service
          - scheduling-service
          - notification-service
          - analytics-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python-services/${{ matrix.service }}/requirements.txt
      - name: Install dependencies
        run: pip install -r python-services/${{ matrix.service }}/requirements.txt pytest pytest-asyncio pytest-cov httpx
      - name: Run tests
        run: |
          cd python-services/${{ matrix.service }}
          pytest tests/ -v --cov=app --cov-report=xml || true
      - uses: codecov/codecov-action@v3
        with:
          file: python-services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

  lint-python:
    name: Lint & Security Scan Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff bandit
      - run: ruff check python-services/ --ignore E501 || true
      - run: bandit -r python-services/ -ll -q || true

  test-dotnet:
    name: Test .NET Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: cd dotnet-services/auth-service && dotnet restore && dotnet build --no-restore
      - run: cd dotnet-services/auth-service && dotnet test --no-build --verbosity normal || true

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run type-check || true
      - run: cd frontend && npm test -- --passWithNoTests

  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-python, test-dotnet, test-frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: ingestion-service
            context: python-services/ingestion-service
            dockerfile: infrastructure/docker/Dockerfile.python
          - service: validation-service
            context: python-services/validation-service
            dockerfile: infrastructure/docker/Dockerfile.python
          - service: ai-service
            context: python-services/ai-service
            dockerfile: infrastructure/docker/Dockerfile.python
          - service: auth-service
            context: dotnet-services/auth-service
            dockerfile: infrastructure/docker/Dockerfile.dotnet
          - service: frontend
            context: frontend
            dockerfile: infrastructure/docker/Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
